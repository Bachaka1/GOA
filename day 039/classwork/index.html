<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>ფეხბურთის ფოტოების გალერია</h1>
    </header>

    <main class="gallery">
        <div class="card">
            <img src="./Untitled-design-1.jpg-1.jpg">
        </div>

        <div class="card">
            <img src="./013e0000-0aff-0242-ec86-08da7ef0b716_cx9_cy1_cw81_w1200_r1.jpg">
        </div>

        <div class="card">
            <img src="./ae7lnmphxqynl9w.jpg">
        </div>

        <div class="card">
            <img src="./geo-team-1.jpg">
        </div>

        <div class="card">
            <img src="./images (2).jpg">
        </div>

        <div class="card">
            <img src="./img-0261-1745323240.jpeg">
        </div>
    </main>

    <!--
    Responsive design ნიშნავს, რომ ვებგვერდი ავტომატურად ერგება სხვადასხვა ზომის ეკრანებს.
    -->

    <header>
        <h1>Sport Shop</h1>
        <p>სპორტული პროდუქციის ონლაინ მაღაზია</p>
    </header>

    <section class="products">

        <div class="product-card">
            <h3>სპორტული ფეხსაცმელი</h3>
            <p>ფასი: 150</p>
            <button>ყიდვა</button>
        </div>

        <div class="product-card">
            <h3>საფეხბურთო ბურთი</h3>
            <p>ფასი: 80</p>
            <button>ყიდვა</button>
        </div>

        <div class="product-card">
            <h3>სპორტული ჩანთა</h3>
            <p>ფასი: 120</p>
            <button>ყიდვა</button>
        </div>

        <!--
        Media Query არის CSS-ის ფუნქცია, რომელიც საშუალებას გვაძლევს ვებგვერდის დიზაინი შევცვალოთ ეკრანის ზომის ან მოწყობილობის ტიპის მიხედვით.
        მას ვიყენებთ იმისთვის, რომ საიტი იყოს Responsive — ანუ სწორად გამოჩნდეს კომპიუტერზე, პლანშეტსა და მობილურზე.
        -->
        <!--
        რესპონსიული საიტის აწყობა საჭიროა რადგან მომხმარებელმა შეძლოს საიტით სარგებლობა, როგორც კომპიუტერიდან ისე ტელეფონიდან.
        -->
</body>
</html>
