<!-- დალაგებული სია (Ordered list) -->
<!-- გამოიყენება მაშინ, როცა ელემენტების თანმიმდევრობა მნიშვნელოვანია -->

<!-- დაულაგებელი სია (Unordered list) -->
<!-- გამოიყენება მაშინ, როცა ელემენტების რიგს მნიშვნელობა არ აქვს -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>სიების მაგალითი</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>დალაგებული სია 1</h2>
<ol class="ordered1">
  <li>პირველი</li>
  <li>მეორე</li>
  <li>მესამე</li>
</ol>

<h2>დალაგებული სია 2</h2>
<ol class="ordered2">
  <li>სწავლის დაწყება</li>
  <li>პრაქტიკა</li>
  <li>შედეგი</li>
</ol>

<h2>დაულაგებელი სია 1</h2>
<ul class="unordered1">
  <li>ხინკალი</li>
  <li>მწვადი</li>
  <li>ხაჭაპური</li>
</ul>

<h2>დაულაგებელი სია 2</h2>
<ul class="unordered2">
  <li>კომპიუტერი</li>
  <li>ტელეფონი</li>
  <li>ტაბლეტი</li>
</ul>



<table>
  <tr class="header">
    <th>Name</th>
    <th>Age</th>
    <th>Salary</th>
  </tr>

  <tr>
    <td>John</td>
    <td>24</td>
    <td>20,000</td>
  </tr>

  <tr>
    <td>Adam</td>
    <td>31</td>
    <td>35,000</td>
  </tr>

  <tr>
    <td>Chris</td>
    <td>27</td>
    <td>32,000</td>
  </tr>
</table>

</body>
</html>
