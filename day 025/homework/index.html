<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Example</title>

    <style>
        
        div {
            border: 2px solid black;
            padding: 20px;
            width: 300px;
        }

        
        .common-style {
            color: white;
            background-color: blue;
            padding: 10px;
            border-radius: 5px;
        }

        
        h1 {
            color: darkgreen;
            text-align: center;
        }

        
        img {
            width: 100%;
            border: 2px solid gray;
        }
    </style>
</head>
<body>

    <div>
        <h1>სათაური</h1>
        <p class="common-style">ეს არის პარაგრაფი</p>
        <button class="common-style">button</button>
        <img src="images.png" alt="example image">
    </div>

</body>
</html>

<style>
        
        /* ID და Class განსხვავება:

        1. id:
           - გამოიყენება უნიკალური ელემენტისთვის
           - ერთ ელემენტს შეიძლება ჰქონდეს მხოლოდ ერთი id
           - CSS-ში ვიძახებთ # ნიშნით 

        2. class:
           - გამოიყენება მრავალ ელემენტზე
           - ერთ ელემენტს შეიძლება ჰქონდეს რამდენიმე class
           - CSS-ში ვიძახებთ . ნიშნით
        */

        /* id selector-ის გამოძახება */
        #title {
            color: red;
        }

        /* class selector-ის გამოძახება */
        .text-style {
            color: blue;
            font-size: 18px;
        }
    </style>


<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>ჩემს შესახებ</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 600px;
            margin: 50px auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1 {
            text-align: center;
            color: darkblue;
        }

        img {
            display: block;
            margin: 0 auto;
            width: 150px;
            border-radius: 50%;
        }

        p {
            font-size: 16px;
            line-height: 1.5;
            color: #333;
        }

        .info {
            background-color: #e6f2ff;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ჩემს შესახებ</h1>

        <img src="html5-css3-hd.jpg" alt="ჩემი ფოტო">

        <p>გამარჯობა! მე ვარ მამუკა, ვსწავლობ HTML-სა და CSS-ს.</p>

        <div class="info">
            <p><strong>სახელი:</strong> მამუკა ბაჩაკაშვილი </p>
            <p><strong>ჰობი:</strong> სპორტი </p>
        </div>

    </div>

</body>
</html>
