<!-- INLINE CSS -->
<!-- იწერება პირდაპირ ელემენტში, მოქმედებს მხოლოდ ერთ ელემენტზე -->

<!-- INTERNAL CSS -->
<!-- იწერება <style> ტეგში, მოქმედებს ერთ HTML ფაილზე -->

<!-- EXTERNAL CSS -->
<!-- ცალკე .css ფაილშია, შეიძლება გამოიყენოს ბევრმა HTML ფაილმა -->

<!-- Buttons in CSS -->
<h2>Buttons in CSS</h2>

<button style="padding:5px 10px;">Button</button>

<button style="padding:5px 10px; background-color:orange; color:white; border:none;">
  New Button1
</button>

<button style="padding:8px 15px; background-color:red; color:white; border:none; font-size:18px;">
  New Button2
</button>

<!-- Button Borders in CSS -->
<h2>Button Borders in CSS</h2>

<button style="border:1px solid black;">Button</button>

<button style="border:2px solid orange;">New Button1</button>

<button style="border:2px dashed red;">New Button2</button>

<button style="border:2px solid blue; padding:5px 10px;">New Button3</button>


<!-- Inline CSS Heading -->
<h1 style="color:blue; font-size:40px;">
  We can apply Inline CSS on this heading.
</h1>

<p style="font-size:18px;">Here is the paragraph.</p>


<div style="border: 3px solid red; padding: 20px; background-color: #ddd; width: fit-content;">
  <h1 style="margin: 0; font-size: 40px; font-weight: bold;">
    Example without CSS
  </h1>
  <p style="margin-top: 15px; font-size: 18px;">
    This is a paragraph.
  </p>
</div>
