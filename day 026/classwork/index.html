<!-- 1
id გამოიყენება როცა კონკრეტული ელემენტის მონიშვნა გვჭირდება.
class გამოიყენება როცა ერთნაირი სტილი გვინდა.
-->

<!DOCTYPE html>
<html>
<head>
  <style>
    .red {
      color: red;
    }

    .green {
      color: green;
    }

    p.box {
      color: blue;
    }

    #mainTitle {
      color: purple;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- 2 -->
  <p class="red">პირველი პარაგრაფი</p>
  <p class="red">მეორე პარაგრაფი</p>
  <p class="green">მესამე პარაგრაფი</p>

  <!-- 3 -->
  <p class="box">პარაგრაფი</p>
  <div class="box">დივი</div>
  <h1 class="box">სათაური</h1>

  <!-- 4 -->
  <h1 id="mainTitle">სათაური</h1>
  <p>პარაგრაფი</p>

</body>
</html>
